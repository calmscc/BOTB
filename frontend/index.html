<!DOCTYPE html>
<html>

<head>

<title>VerifAI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h1>AI Product Visibility Dashboard</h1>

<input id="product" placeholder="Enter product (ex: hammer)">
<input id="brand" placeholder="Enter brand (ex: Stanley)">

<button onclick="run()">Analyze</button>

<div class="cards">

<div class="card">
<h3>Visibility Score</h3>
<div id="visibility">--</div>
</div>

<div class="card">
<h3>Accuracy Score</h3>
<div id="accuracy">--</div>
</div>

</div>

<h2>Competitor Share</h2>
<canvas id="competitorChart"></canvas>

<h2>AI Visibility Heatmap</h2>
<canvas id="heatmapChart"></canvas>

<h2>AI Responses</h2>
<div id="responses"></div>

<script src="/static/dashboard.js"></script>

</body>

</html>
