<!DOCTYPE html>
<html>

<head>

<title>NOLAlytics AI Retail Visibility Analyzer</title>

<style>

body{
 font-family:Arial;
 max-width:900px;
 margin:auto;
 padding:40px;
 background:#f9f9f9;
}

button{
 padding:10px 15px;
 margin-top:10px;
 cursor:pointer;
}

input{
 padding:8px;
 margin-right:10px;
}

#results{
 margin-top:20px;
 background:white;
 padding:15px;
 border-radius:8px;
}

</style>

</head>

<body>

<h1>NOLAlytics AI Retail Visibility Analyzer</h1>

<h2>Check Store Visibility in AI Chatbots</h2>

<input id="storeInput" placeholder="Retail Store (example: Walmart)" />

<input id="productInput" placeholder="Product (example: headphones)" />

<button onclick="runAudit()">Analyze Visibility</button>

<div id="results"></div>

<script>

async function runAudit(){

 const store = document.getElementById("storeInput").value
 const product = document.getElementById("productInput").value

 document.getElementById("results").innerHTML =
 "Running AI visibility audit..."

 const res = await fetch(`/api/audit`,{

  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({ store, product })

 })

 const data = await res.json()

 let html = `
 <h3>AI Visibility Results</h3>

 Store: <b>${data.store}</b><br>
 Product: <b>${data.product}</b><br><br>
 `

 for(const engine in data.visibility){

  html += `
   <h4>${engine.toUpperCase()}</h4>

   Mentions: ${data.mentions[engine]} <br>
   Visibility Score: ${data.visibility[engine]}% <br><br>
  `
 }

 html += `Queries Tested: ${data.promptsTested}`

 document.getElementById("results").innerHTML = html

}

</script>

</body>

</html>
